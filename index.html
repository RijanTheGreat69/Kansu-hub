
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kansu Hub</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="logo-area">
        <span class="web-title">Kansu Hub</span>
    </div>

    <div class="heart-bg-container">
        <div class="heart-particle">❤️</div>
        <div class="heart-particle">❤️</div>
        <div class="heart-particle">❤️</div>
        <div class="heart-particle">❤️</div>
        <div class="heart-particle">❤️</div>
    </div>

    <input type="checkbox" id="open-trigger">

    <div class="cupid-wrapper left-side">
        <img src="./images/cupid.png" alt="Cupid Left" class="cupid-img">
        <div class="shot-arrow">💘</div>
    </div>

    <div class="cupid-wrapper right-side">
        <img src="./images/cupid.png" alt="Cupid Right" class="cupid-img">
        <div class="shot-arrow">💘</div>
    </div>

    <div class="center-stage">
        <div class="love-bird">
            <div class="wing left-wing"></div>
            <div class="bird-body">
                <div class="eye"></div>
                <div class="beak"></div>
            </div>
            <div class="wing right-wing"></div>
            <div class="envelope-wrapper">
                <label for="open-trigger" class="envelope">
                    <div class="envelope-back"></div>
                    <div class="letter-card">
                        <p class="letter-text">Sandhya, you are special ❤️</p>
                    </div>
                    <div class="envelope-front"></div>
                    <div class="envelope-top-flap"></div>
                </label>
            </div>
        </div>
    </div>

    <label for="open-trigger" class="open-hint">✉️ Click to open</label>

    <div class="enter-link-area">
        <a href="main.html" class="enter-btn">Enter Sandhya's Space →</a>
    </div>

</body>
</html>
